# BFP Berong - Nginx Configuration
# Reverse proxy for Next.js frontend and Python AI backend

# --- Rate Limiting Zones ---
# Auth endpoints: 5 requests/minute per IP (brute force protection)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# API endpoints: 20 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
# Simulation endpoints: 2 requests/minute per IP (expensive AI processing)
limit_req_zone $binary_remote_addr zone=simulation:10m rate=2r/m;
# General traffic: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
# Standard 429 response for rate-limited requests
limit_req_status 429;

upstream nextjs {
    server nextjs:3000;
    keepalive 32;
}

upstream python_backend {
    server python-backend:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com; frame-src 'self' https://www.youtube.com https://www.facebook.com; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;
    gzip_comp_level 6;
    
    # Client body size (for file uploads)
    client_max_body_size 50M;
    
    # Proxy timeouts (important for AI processing)
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    
    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
    
    # --- Rate-limited auth endpoints (brute force protection) ---
    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Simulation STATUS polling (lightweight DB lookup, needs frequent polling) ---
    location /api/simulation/status/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # --- Rate-limited simulation endpoints (expensive AI processing) ---
    location /api/simulation/ {
        limit_req zone=simulation burst=2 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- Rate-limited API endpoints ---
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Python Backend - Direct access to docs (for debugging)
    location /backend/ {
        limit_req zone=simulation burst=2 nodelay;
        proxy_pass http://python_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static files - Cache aggressively
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # Uploaded files
    location /uploads/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # ALL remaining requests go to Next.js (pages, assets)
    location / {
        limit_req zone=general burst=60 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Longer timeout for AI processing
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
